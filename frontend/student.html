<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>كلاس روم برو - منصة مراقبة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8f9fa; }
        .monitor-active { border: 2px solid #1a73e8; }
    </style>
</head>
<body class="bg-gray-50">

    <nav class="bg-white border-b px-6 py-3 flex justify-between items-center shadow-sm">
        <div class="flex items-center gap-4">
            <span class="text-2xl text-gray-600">☰</span>
            <h1 class="text-xl font-semibold text-gray-700">كلاس روم <span class="text-blue-600 underline">برو</span></h1>
        </div>
        <div class="flex items-center gap-4">
            <div class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-sm font-bold">وضع المراقبة نشط 🔒</div>
            <div class="w-10 h-10 bg-purple-500 rounded-full flex items-center justify-center text-white font-bold">A</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto mt-10 p-6">
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
            <div class="bg-blue-600 h-32 p-6 text-white flex flex-col justify-end">
                <h2 class="text-3xl font-bold">اختبار البرمجة المتقدم</h2>
                <p class="opacity-80">قسم هندسة البرمجيات</p>
            </div>
            
            <div class="p-8">
                <div id="alert-box" class="hidden mb-6 bg-red-100 border-r-4 border-red-500 p-4 text-red-700 font-bold animate-pulse">
                    ⚠️ تنبيه: لقد غادرت نافذة الاختبار! تم تسجيل هذا النشاط وإرساله للمشرف.
                </div>

                <div class="space-y-6">
                    <p class="text-gray-600 leading-relaxed">يرجى الإجابة على الأسئلة التالية بعناية. تذكر أن النظام يراقب حركات الماوس، تبديل التبويبات، ومحاولات النسخ.</p>
                    
                    <div class="border p-4 rounded-lg hover:bg-gray-50 transition">
                        <label class="block font-bold mb-2 text-gray-800">1. ما هي اللغة التي نستخدمها لبرمجة "عقل" الموقع؟</label>
                        <input type="text" class="w-full border p-2 rounded mt-2 outline-none focus:border-blue-500" placeholder="اكتب إجابتك هنا...">
                    </div>
                </div>

                <button class="mt-8 bg-blue-600 text-white px-8 py-2 rounded-lg font-bold hover:bg-blue-700 transition">تسليم الاختبار</button>
            </div>
        </div>
    </main>

    <script>
        // منع كليك يمين والنسخ
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => {
            e.preventDefault();
            alert("النسخ غير مسموح به في هذا الاختبار!");
        });

        // مراقبة مغادرة الصفحة
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                document.getElementById('alert-box').classList.remove('hidden');
                // مستقبلاً هنا نرسل إشارة للسيرفر
            }
        });
    </script>
</body>
</html>
