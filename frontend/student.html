<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>صفحة الامتحان المراقبة</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; }
        .warning { color: red; display: none; }
    </style>
</head>
<body>
    <h1>امتحان مادة البرمجة</h1>
    <p>ملاحظة: هذه الصفحة مراقبة، أي خروج منها سيتم إبلاغ المعلم فوراً.</p>
    <h2 id="msg" class="warning">لقد حاولت الغش بترك الصفحة!</h2>

    <script>
        // 1. منع كليك يمين
        document.addEventListener('contextmenu', e => e.preventDefault());

        // 2. مراقبة مغادرة الصفحة (التبويب)
        document.addEventListener("visibilitychange", () => {
            if (document.hidden) {
                document.getElementById('msg').style.display = 'block';
                // هنا مستقبلاً سنرسل التنبيه للسيرفر برمجياً
                console.log("تم تسجيل محاولة خروج!");
            }
        });
    </script>
</body>
</html>
